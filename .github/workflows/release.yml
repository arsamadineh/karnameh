name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # DESKTOP BUILD: Windows / macOS / Linux
  # ─────────────────────────────────────────────────────
  build-desktop:
    name: Desktop (${{ matrix.platform }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl wget file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish desktop release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          SQLX_OFFLINE: true
        with:
          tagName: v__VERSION__
          releaseName: "کارنامه v__VERSION__"
          releaseBody: |
            ## کارنامه - نرم‌افزار مدیریت پروژه فارسی

            برای دانلود نسخه مناسب سیستم‌عامل خود، فایل‌های زیر را دریافت کنید:
            - **ویندوز**: فایل `.msi` یا `.exe`
            - **macOS**: فایل `.dmg`
            - **لینوکس**: فایل `.deb` یا `.AppImage`
            - **اندروید**: فایل `.apk`
          releaseDraft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          args: ${{ matrix.args }}

  # ─────────────────────────────────────────────────────
  # ANDROID BUILD: Debug APK (installs immediately, no signing required)
  # ─────────────────────────────────────────────────────
  build-android:
    name: Android APK
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    env:
      # Single source of truth for the NDK path — consumed by every step below.
      NDK_VERSION: '27.0.11902837'
      SQLX_OFFLINE: 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve NDK home
        id: ndk
        run: |
          sdkmanager --install "ndk;${NDK_VERSION}" "build-tools;34.0.0"
          echo "ndk_home=${ANDROID_HOME}/ndk/${NDK_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: |
            aarch64-linux-android
            armv7-linux-androideabi
            i686-linux-android
            x86_64-linux-android

      - name: Rust build cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Initialize Tauri Android project
        run: npx tauri android init
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk_home }}

      # Debug build => APK is signed with the debug keystore, so it installs
      # on any Android device without a custom signing setup or Play Store.
      - name: Build Android debug APK
        run: npx tauri android build --apk --debug
        env:
          NDK_HOME: ${{ steps.ndk.outputs.ndk_home }}

      # Move the final per-ABI APKs into a clean folder with explicit names so
      # the release assets are self-documenting and intermediates are excluded.
      - name: Stage and rename APKs
        id: stage
        run: |
          set -euo pipefail
          STAGE="${RUNNER_TEMP}/apk"
          mkdir -p "$STAGE"
          ABI_MAP_ARM64="arm64-v8a"
          ABI_MAP_ARMV7="armeabi-v7a"
          ABI_MAP_X86="x86"
          ABI_MAP_X64="x86_64"
          while IFS= read -r apk; do
            case "$apk" in
              *"/arm64-v8a/"*)     cp "$apk" "$STAGE/karnameh-android-${ABI_MAP_ARM64}-debug.apk" ;;
              *"/armeabi-v7a/"*)   cp "$apk" "$STAGE/karnameh-android-${ABI_MAP_ARMV7}-debug.apk" ;;
              *"/x86/"*)           cp "$apk" "$STAGE/karnameh-android-${ABI_MAP_X86}-debug.apk" ;;
              *"/x86_64/"*)        cp "$apk" "$STAGE/karnameh-android-${ABI_MAP_X64}-debug.apk" ;;
              *)                   cp "$apk" "$STAGE/$(basename "$apk")" ;;
            esac
          done < <(find src-tauri/gen/android/app/build/outputs/apk -name '*.apk')
          echo "Found staged APKs:"
          ls -lh "$STAGE"
          echo "stage_dir=$STAGE" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.stage.outputs.stage_dir }}/*.apk
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-debug
          path: ${{ steps.stage.outputs.stage_dir }}/*.apk
          if-no-files-found: warn
